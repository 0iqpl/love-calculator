<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="main-section">
         <div class="container">
            <p>❤️</p>
            <h1 class="container-heading">Love Calculator</h1>
            <h2 id="love-percentage"></h2>
            <div class="input-container">
                <input type="text" required name="first-name" placeholder="First Name:" class="input-name"/>
                <input type="text" required name="second-name" placeholder="Second Name:" class="input-name"/>
                <button class="calculate-btn" onclick="calculateLove()">Calculate Love</button>
            </div>
        </div>
    </section>
    <script src="love.js"></script>
</body>
</html>
